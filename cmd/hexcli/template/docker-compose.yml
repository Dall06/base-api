version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: template-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: base_user
      POSTGRES_PASSWORD: base_password
      POSTGRES_DB: base_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: template-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
