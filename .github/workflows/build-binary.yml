name: Build Binary

on:
  push:
    tags:
      - 'bin/gateway/v*'
      - 'bin/companies/v*'
      - 'bin/gym/v*'
      - 'bin/provisioner/v*'
      - 'bin/agent/v*'
      - 'bin/pie/v*'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build'
        required: true
        type: choice
        options:
          - gateway
          - companies
          - gym
          - provisioner
          - agent
          - pie
      version:
        description: 'Version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  detect:
    name: Detect Target
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.parse.outputs.service }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse tag or inputs
        id: parse
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "service=${{ inputs.service }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            # bin/gym/v1.0.0 -> service=gym, version=v1.0.0
            SERVICE=$(echo "$TAG" | cut -d'/' -f2)
            VERSION=$(echo "$TAG" | cut -d'/' -f3)
            echo "service=$SERVICE" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: detect
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test -v -race -short -p 2 -timeout 5m ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: [detect, test]
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          SERVICE="${{ needs.detect.outputs.service }}"
          VERSION="${{ needs.detect.outputs.version }}"
          EXT=""
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            EXT=".exe"
          fi

          OUTPUT="bro-${SERVICE}-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"

          go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o "${OUTPUT}" \
            ./cmd/${SERVICE}/

          echo "Built: ${OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bro-${{ needs.detect.outputs.service }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bro-${{ needs.detect.outputs.service }}-*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [detect, build]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bro-${{ needs.detect.outputs.service }}-*
          merge-multiple: true

      - name: List binaries
        run: ls -lh bro-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: bin/${{ needs.detect.outputs.service }}/${{ needs.detect.outputs.version }}
          name: "bro-${{ needs.detect.outputs.service }} ${{ needs.detect.outputs.version }}"
          files: bro-*
          generate_release_notes: true
